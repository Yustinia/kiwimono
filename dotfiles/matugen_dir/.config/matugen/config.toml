[config]

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.mako]
input_path = '~/.config/matugen/templates/mako-colors.conf'
output_path = '~/.config/mako/colors'


[templates.nvim]
input_path = '~/.config/matugen/templates/nvim-colors.lua'
output_path = '~/.config/nvim/lua/matugen/colors.lua'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell-colors.qml'
output_path = '~/.config/quickshell/global/Colors.qml'

[templates.qofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path ='~/.config/rofi/colors.rasi'

[templates.superfile]
input_path = '~/.config/matugen/templates/superfile-colors.toml'
output_path = '~/.config/superfile/theme/matugen.toml'
