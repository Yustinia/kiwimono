# ==================================================
# Terminal Capabilities
# ==================================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"


# ==================================================
# Status Line
# ==================================================

set -g status-left '#{?client_prefix,[PREFIX],} '


# ==================================================
# Pane Resizing (prefix + = - + _)
# ==================================================

bind -r = resize-pane -R 2
bind -r - resize-pane -L 2
bind -r + resize-pane -U 2
bind -r _ resize-pane -D 2


# ==================================================
# Pane Swapping (prefix + i/k/J/L)
# ==================================================

bind i swap-pane -U
bind k swap-pane -D

bind j select-pane -L \; swap-pane -d -t '{last}' \; select-pane -R
bind l select-pane -R \; swap-pane -d -t '{last}' \; select-pane -L


# ==================================================
# Pane Splitting
# ==================================================

bind v split-window -h
bind h split-window -v


# ==================================================
# Window Management
# ==================================================

# Rename window
bind r command-prompt "rename-window '%%'"

# Close current pane
bind q kill-pane
