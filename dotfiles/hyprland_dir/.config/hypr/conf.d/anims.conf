# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1 1
    bezier = linear,         0.5,  0.5,  0.75, 1
    bezier = easeOut,        0.25, 0.25, 0.25, 1
    bezier = easeInOut,      0.5,  0.15, 0.5,  0.85

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,                ONOFF, SPEED,  CURVE,          [STYLE]
    animation = global,              1,     10,     easeOut

    animation = border,              1,     1,      linear
    
    animation = windows,             1,     5,      easeOut
    animation = windowsIn,           1,     5,      easeOut,        popin 80%
    animation = windowsOut,          1,     5,      easeOut,        popin 80%
    animation = windowsMove,         1,     5,      easeOut
    
    animation = layers,              1,     3,      linear
    animation = layersIn,            1,     3,      linear,         fade
    animation = layersOut,           1,     3,      linear,         fade
    
    animation = fade,                1,     3,      linear
    animation = fadeIn,              1,     3,      linear
    animation = fadeOut,             1,     3,      linear
    animation = fadeSwitch,          1,     3,      linear
    animation = fadeShadow,          1,     3,      linear
    animation = fadeDim,             1,     3,      linear
    animation = fadeLayers,          1,     3,      linear
    animation = fadeLayersIn,        1,     3,      linear
    animation = fadeLayersOut,       1,     3,      linear
    animation = fadePopups,          1,     3,      linear
    animation = fadePopupsIn,        1,     3,      linear
    animation = fadePopupsOut,       1,     3,      linear
    
    animation = workspaces,          1,     5,      easeOut
    animation = workspacesIn,        1,     5,      easeOut,        slide
    animation = workspacesOut,       1,     5,      easeOut,        slide
    
    animation = specialWorkspace,    1,     5,      easeOut,        fade
    animation = specialWorkspaceIn,  1,     5,      easeOut,        slidefade bottom 20%
    animation = specialWorkspaceOut, 1,     5,      easeOut,        slidefade bottom 20%
    
    # animation = zoomFactor,          1,     1,      easeOut

    # animation = monitorAdded,        1,     1,      easeOut
}